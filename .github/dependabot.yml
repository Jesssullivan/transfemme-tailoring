version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'monthly'
    target-branch: 'main'
    open-pull-requests-limit: 3
    ignore:
      # Launch toolchain pins are deliberate; major upgrades need a ticketed proof.
      - dependency-name: 'typescript'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: 'eslint'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: '@types/node'
        update-types:
          - 'version-update:semver-major'
      # In-house deps come from the Bazel BCR (SSOT) and are exact-pinned to
      # bazel_dep via inhouse-package-parity — never let Dependabot bump them.
      - dependency-name: '@tummycrypt/*'
      # Skeleton + Tailwind v4 are pinned exact until a coordinated migration.
      - dependency-name: '@skeletonlabs/*'
      - dependency-name: 'tailwindcss'
      - dependency-name: '@tailwindcss/*'
    groups:
      all-npm:
        patterns:
          - '*'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
    target-branch: 'main'
    open-pull-requests-limit: 2
    groups:
      all-actions:
        patterns:
          - '*'
