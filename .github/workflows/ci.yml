name: CI

# Self-contained CI for the personal transfemme-tailoring spoke.
# The scaffold default delegates to tinyland-inc/ci-templates' reusable
# spoke-ci.yml (org runner classes + secrets), which a personal repo can't
# reach. We run the same gates locally-equivalent via the Nix devshell + just,
# so CI matches `just check` / `just build` exactly.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-build:
    name: check + static build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Install workspace dependencies
        run: nix develop --command just setup

      - name: Check (gitleaks + lint + typecheck + unit tests)
        run: nix develop --command just check

      - name: Static build (project base path)
        run: nix develop --command just build
        env:
          BASE_PATH: /transfemme-tailoring

  bazel-graph:
    name: Bazel module-graph integrity
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      # Bazel exists for module-graph integrity proofs (SSOT for the
      # @tummycrypt/* deps via tinyland-inc/bazel-registry). The canonical
      # app build stays `pnpm run build`; cache-first remote build/test is the
      # Phase-2 Flywheel uplift (`just flywheel-build` / `just flywheel-test`).
      - name: bazelisk mod graph
        run: nix develop --command bazelisk mod graph
