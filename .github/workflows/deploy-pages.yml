name: Deploy to GitHub Pages

# Personal GitHub Pages deploy for the transfemme-tailoring static spoke.
# Builds through the full scaffold toolchain (Nix devshell + `just`) so CI
# matches local, then publishes build/ to GitHub Pages. This is the Option-A
# shape from TIN-2230 (the scaffold default ships a Cloudflare workflow that
# contradicts its documented adapter-static -> GitHub Pages baseline).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Install workspace dependencies
        run: nix develop --command just setup

      - name: Build static site (project base path = /transfemme-tailoring)
        run: nix develop --command just build
        env:
          NODE_ENV: production
          # Explicit slug (the GitHub repo is named transfemme-tailoring, which
          # is also the Pages project path). svelte.config.js reads BASE_PATH.
          BASE_PATH: /transfemme-tailoring

      - uses: actions/upload-pages-artifact@v5
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v5
        id: deployment
